<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rueiyu - Personal Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor"></div>
    <div class="cursor-follower"></div>
    <nav class="navbar">
        <div class="logo">Rueiyu.</div>
        <div class="nav-links">
            <a href="#home" class="active">Home</a>
            <a href="#about">About</a>
            <a href="#work">Work</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <main class="hero">
        <div class="container">
            <p class="greeting">Hello, I am</p>
            <h1 class="title">Rueiyu</h1>
            <p class="subtitle">Creative Developer &amp; Designer</p>
            <div class="time-container">
                <span class="pulse-dot"></span>
                <p>Local Time: <span id="current-time">2026-02-25 20:25:51</span></p>
            </div>
            <div class="cta-group">
                <a href="#work" class="btn btn-primary">View My Work</a>
                <a href="#contact" class="btn btn-secondary">Contact Me</a>
            </div>
        </div>
        <div class="hero-image-container">
            <div class="hero-shape"></div>
            <!-- placeholder for personal image, using a refined abstract shape instead for the template feel -->
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
